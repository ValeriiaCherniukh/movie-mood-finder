{% extends "main/base.html" %}
{% block content %}

<div class="auth">
  <div class="auth-card">
    <h1 class="auth-title">Login</h1>
    <p class="auth-subtitle">Welcome back. Let’s get you in.</p>

    {% if form.errors %}
      <div class="auth-alert">
        Hmm. Something is wrong. Check the fields below.
      </div>
    {% endif %}

    <form method="post" class="auth-form">
      {% csrf_token %}

      <label class="auth-label" for="id_username">Username</label>
      {{ form.username }}

      <label class="auth-label" for="id_password">Password</label>
      {{ form.password }}

      <button type="submit" class="auth-btn">Login</button>
    </form>

    <div class="auth-footer">
      <span>New here?</span>
      <a class="auth-link" href="{% url 'register' %}">Create an account</a>
    </div>
  </div>
</div>

{% endblock %}
